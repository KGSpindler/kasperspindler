<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Photography — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --page: #fff;
    --text: #111;
    --muted: #777;
    --soft: #e9e9e9;
    --max: 1160px;
    --wide: 1380px;
    --side: clamp(18px, 5vw, 76px);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--page);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.55;
  }

  a { color: inherit; text-decoration: none; }
  img { display: block; max-width: 100%; height: auto; }

  .hero {
    --hero-focus-y: 58%;
    position: relative;
    width: 100%;
    height: 100svh;
    overflow: hidden;
    background: #000;
  }

  .hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center var(--hero-focus-y);
    margin: 0;
    opacity: 1;
  }

  .hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to bottom, rgba(0,0,0,0.46), rgba(0,0,0,0.03) 34%, rgba(0,0,0,0.28)),
      linear-gradient(to right, rgba(0,0,0,0.22), transparent 42%);
    pointer-events: none;
  }

  .back-link {
    position: absolute;
    z-index: 2;
    top: clamp(20px, 3.5vw, 44px);
    left: var(--side);
    color: rgba(255,255,255,0.86);
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 12px 0;
    transition: opacity 0.2s ease;
  }
  .back-link::before { content: '← '; }
  .back-link:hover { opacity: 0.62; }


  .hero-copy {
    position: absolute;
    z-index: 2;
    left: var(--side);
    bottom: clamp(28px, 5vw, 58px);
    width: min(620px, calc(100% - (var(--side) * 2)));
    color: white;
    pointer-events: none;
  }

  .kicker {
    display: block;
    font-size: 0.68rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.68);
    margin-bottom: 16px;
  }

  .hero-title {
    font-size: clamp(2rem, 5vw, 5.6rem);
    line-height: 0.96;
    font-weight: 300;
    letter-spacing: -0.055em;
    text-transform: lowercase;
  }

  .hero-buffer {
    height: clamp(24px, 4.2vw, 52px);
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fff;
  }

  .hero-buffer::after {
    content: '';
    width: min(76px, 24vw);
    height: 1px;
    background: linear-gradient(to right, transparent, #d7d7d7, transparent);
  }

  .intro {
    max-width: var(--max);
    margin: 0 auto;
    padding: clamp(28px, 5vw, 64px) var(--side) clamp(16px, 3vw, 36px);
    display: grid;
    grid-template-columns: minmax(280px, 1fr);
    gap: 0;
    border-bottom: 0;
  }

  .intro-label {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    padding-top: 0.35em;
  }

  .intro-text h1 {
    font-size: clamp(1.55rem, 3vw, 3rem);
    line-height: 1.08;
    font-weight: 300;
    letter-spacing: -0.04em;
    max-width: 820px;
    margin-bottom: clamp(22px, 3vw, 36px);
  }

  .intro-text p {
    max-width: 760px;
    font-size: clamp(1.05rem, 1.8vw, 1.55rem);
    line-height: 1.2;
    font-weight: 300;
    letter-spacing: -0.03em;
    color: #2f2f2f;
    text-transform: lowercase;
  }

  .intro-text p + p { margin-top: 8px; }

  .portfolio {
    max-width: var(--wide);
    margin: 0 auto;
    padding: clamp(16px, 3vw, 36px) var(--side) clamp(84px, 12vw, 168px);
  }

  .photo-block { margin: 0 0 clamp(54px, 8.5vw, 132px); }
  .photo-block:last-child { margin-bottom: 0; }

  .photo-block.full { max-width: var(--wide); }
  .photo-block.medium { max-width: min(980px, 100%); }
  .photo-block.narrow { max-width: min(620px, 100%); }
  .photo-block[data-ratio="landscape"] { max-width: min(1220px, 100%); }
  .photo-block[data-ratio="portrait"] { max-width: min(760px, 100%); }

  .photo-block.left { margin-right: auto; }
  .photo-block.right { margin-left: auto; }
  .photo-block.center { margin-left: auto; margin-right: auto; }

  .photo-pair {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 0.88fr);
    gap: clamp(24px, 5vw, 72px);
    align-items: start;
    margin-bottom: clamp(60px, 9vw, 140px);
  }

  .photo-pair.reverse { grid-template-columns: minmax(0, 0.82fr) minmax(0, 1fr); }
  .photo-pair .photo-block { margin-bottom: 0; }
  .photo-pair .photo-block:nth-child(2) { margin-top: clamp(34px, 7vw, 108px); }
  .photo-pair .photo-block[data-ratio] { max-width: 100%; }

  .photo-cluster {
    margin-top: clamp(20px, 4vw, 54px);
    display: grid;
    grid-template-columns: repeat(6, minmax(0, 1fr));
    gap: clamp(10px, 1.8vw, 20px);
    align-items: start;
  }

  .cluster-item {
    margin: 0;
  }

  .cluster-item.landscape { grid-column: span 2; }
  .cluster-item.portrait { grid-column: span 2; grid-row: span 2; }

  .cluster-item .caption {
    padding-top: 8px;
    font-size: 0.58rem;
    letter-spacing: 0.1em;
  }

  .photo-frame {
    cursor: zoom-in;
    background: #f6f6f6;
  }

  .photo-frame img {
    width: 100%;
    height: auto;
    object-fit: contain;
    transition: filter 0.25s ease, transform 0.45s cubic-bezier(.2,.7,.2,1);
  }

  .photo-frame:hover img {
    filter: brightness(0.94);
    transform: scale(0.996);
  }

  .caption {
    display: flex;
    justify-content: space-between;
    gap: 20px;
    padding-top: 13px;
    color: var(--muted);
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  .lightbox {
    position: fixed;
    inset: 0;
    z-index: 50;
    background: rgba(8,8,8,0.96);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }

  .lightbox.active { opacity: 1; pointer-events: auto; }

  .lightbox-img {
    max-width: 94vw;
    max-height: 90vh;
    object-fit: contain;
  }

  .lightbox-close,
  .lightbox-nav {
    position: fixed;
    z-index: 55;
    border: 0;
    background: transparent;
    color: rgba(255,255,255,0.58);
    cursor: pointer;
    font-family: inherit;
    transition: color 0.2s ease;
  }

  .lightbox-close:hover,
  .lightbox-nav:hover { color: #fff; }

  .lightbox-close {
    top: 22px;
    right: 28px;
    font-size: 1.7rem;
    font-weight: 300;
  }

  .lightbox-nav {
    top: 50%;
    transform: translateY(-50%);
    font-size: 1.8rem;
    padding: 20px;
  }

  .lightbox-nav.prev { left: 12px; }
  .lightbox-nav.next { right: 12px; }

  .lightbox-counter {
    position: fixed;
    top: 28px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.42);
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .footer {
    border-top: 1px solid var(--soft);
    padding: 44px var(--side) 58px;
    display: flex;
    justify-content: center;
  }

  .footer a {
    color: var(--muted);
    font-size: 0.72rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }
  .footer a::before { content: '← '; }

  @media (max-width: 860px) {
    .intro { grid-template-columns: 1fr; gap: 0; }
    .photo-pair,
    .photo-pair.reverse {
      grid-template-columns: 1fr;
      gap: clamp(48px, 8vw, 86px);
    }
    .photo-pair .photo-block:nth-child(2) { margin-top: 0; }
    .photo-block.narrow,
    .photo-block.medium { max-width: 100%; }
    .photo-cluster { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .cluster-item.landscape,
    .cluster-item.portrait { grid-column: span 1; grid-row: auto; }
    .lightbox-nav { display: none; }
  }

  @media (max-width: 560px) {
    .hero-copy { bottom: clamp(20px, 6vw, 34px); }
    .portfolio { padding-left: 14px; padding-right: 14px; }
    .intro { padding-left: 22px; padding-right: 22px; }
    .caption { font-size: 0.62rem; }
  }
</style>
</head>
<body>

<section class="hero" aria-label="Opening image">
  <img src="headlights-hero-deer.jpg" alt="Deer standing in a dark forest beside a moss-covered tree" width="4000" height="6000" />
  <a class="back-link" href="../index.html">Back</a>
  <div class="hero-copy">
    <div class="hero-title">headlights</div>
  </div>
</section>

<div class="hero-buffer" aria-hidden="true"></div>

<main>
  <section class="portfolio" aria-label="Photography portfolio">
    <figure class="photo-block medium right photo-item" data-src="headlights-mossy-roots.jpg" data-ratio="landscape">
      <div class="photo-frame"><img src="headlights-mossy-roots.jpg" alt="Tree roots across stone steps and moss-covered wall" loading="lazy" width="6000" height="4000" /></div>
      <figcaption class="caption"><span>2024-06-23 15:54</span><span>ILCE-6400 - 31mm - f/9 - 1/250 - ISO 1600</span></figcaption>
    </figure>

    <figure class="photo-block full center photo-item" data-src="headlights-misty-valley.jpg" data-ratio="portrait">
      <div class="photo-frame"><img src="headlights-misty-valley.jpg" alt="Misty green mountain valley with low clouds" loading="lazy" width="4000" height="6000" /></div>
      <figcaption class="caption"><span>2024-06-23 15:53</span><span>ILCE-6400 - 50mm - f/9 - 1/250 - ISO 1600</span></figcaption>
    </figure>

    <div class="photo-cluster" aria-label="Additional frames">
      <figure class="cluster-item landscape photo-item" data-src="headlights-forest-banners.jpg">
        <div class="photo-frame"><img src="headlights-forest-banners.jpg" alt="Forest path with hanging fabric banners" loading="lazy" width="6000" height="4000" /></div>
        <figcaption class="caption"><span>2024-04-02 11:49</span><span>ILCE-6400 - 50mm - f/11 - 1/250 - ISO 2000</span></figcaption>
      </figure>
      <figure class="cluster-item portrait photo-item" data-src="headlights-green-passage.jpg">
        <div class="photo-frame"><img src="headlights-green-passage.jpg" alt="Portfolio photo 06" loading="lazy" width="4000" height="6000" /></div>
        <figcaption class="caption"><span>2024-04-24 12:45</span><span>ILCE-6400 - 44mm - f/9 - 1/160 - ISO 100</span></figcaption>
      </figure>
      <figure class="cluster-item landscape photo-item" data-src="headlights-sunlit-forest.jpg">
        <div class="photo-frame"><img src="headlights-sunlit-forest.jpg" alt="Portfolio photo 05" loading="lazy" width="6000" height="4000" /></div>
        <figcaption class="caption"><span>2024-04-24 13:12</span><span>ILCE-6400 - 50mm - f/9 - 1/200 - ISO 125</span></figcaption>
      </figure>
      <figure class="cluster-item landscape photo-item" data-src="headlights-cluster-20240329.jpg">
        <div class="photo-frame"><img src="headlights-cluster-20240329.jpg" alt="Additional frame 01" loading="lazy" width="6000" height="4000" /></div>
        <figcaption class="caption"><span>2024-03-29 13:37</span><span>ILCE-6400 - 49mm - f/11 - 1/400 - ISO 400</span></figcaption>
      </figure>
      <figure class="cluster-item portrait photo-item" data-src="headlights-cluster-20240402b.jpg">
        <div class="photo-frame"><img src="headlights-cluster-20240402b.jpg" alt="Additional frame 02" loading="lazy" width="4000" height="6000" /></div>
        <figcaption class="caption"><span>2024-04-02 11:46</span><span>ILCE-6400 - 50mm - f/18 - 1/125 - ISO 6400</span></figcaption>
      </figure>
      <figure class="cluster-item landscape photo-item" data-src="headlights-cluster-20240403.jpg">
        <div class="photo-frame"><img src="headlights-cluster-20240403.jpg" alt="Additional frame 03" loading="lazy" width="6000" height="4000" /></div>
        <figcaption class="caption"><span>2024-04-03 16:52</span><span>ILCE-6400 - 50mm - f/13 - 1/400 - ISO 6400</span></figcaption>
      </figure>
      <figure class="cluster-item landscape photo-item" data-src="headlights-cluster-20240405.jpg">
        <div class="photo-frame"><img src="headlights-cluster-20240405.jpg" alt="Additional frame 04" loading="lazy" width="6000" height="4000" /></div>
        <figcaption class="caption"><span>2024-04-05 14:18</span><span>ILCE-6400 - 50mm - f/7.1 - 1/500 - ISO 500</span></figcaption>
      </figure>
      <figure class="cluster-item landscape photo-item" data-src="headlights-cluster-20240408.jpg">
        <div class="photo-frame"><img src="headlights-cluster-20240408.jpg" alt="Additional frame 05" loading="lazy" width="6000" height="4000" /></div>
        <figcaption class="caption"><span>2024-04-08 17:42</span><span>ILCE-6400 - 50mm - f/5.6 - 1/100 - ISO 4000</span></figcaption>
      </figure>
      <figure class="cluster-item landscape photo-item" data-src="headlights-cluster-20240410.jpg">
        <div class="photo-frame"><img src="headlights-cluster-20240410.jpg" alt="Additional frame 06" loading="lazy" width="6000" height="4000" /></div>
        <figcaption class="caption"><span>2024-04-10 13:24</span><span>ILCE-6400 - 50mm - f/11 - 1/100 - ISO 250</span></figcaption>
      </figure>
      <figure class="cluster-item landscape photo-item" data-src="headlights-cluster-20240626.jpg">
        <div class="photo-frame"><img src="headlights-cluster-20240626.jpg" alt="Additional frame 07" loading="lazy" width="5129" height="3419" /></div>
        <figcaption class="caption"><span>2024-06-26 12:43</span><span>ILCE-6400 - 50mm - f/5.6 - 1/160 - ISO 125</span></figcaption>
      </figure>
    </div>

  </section>
</main>

<footer class="footer"><a href="../index.html">Back</a></footer>

<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer">
  <button class="lightbox-close" id="lb-close" aria-label="Close">×</button>
  <button class="lightbox-nav prev" id="lb-prev" aria-label="Previous">←</button>
  <button class="lightbox-nav next" id="lb-next" aria-label="Next">→</button>
  <div class="lightbox-counter" id="lb-counter"></div>
  <img class="lightbox-img" id="lb-img" src="" alt="" />
</div>

<script>
  const items = Array.from(document.querySelectorAll('.photo-item'));
  let current = 0;
  const lightbox = document.getElementById('lightbox');
  const lightboxImage = document.getElementById('lb-img');
  const lightboxCounter = document.getElementById('lb-counter');

  function showImage() {
    const item = items[current];
    const image = item.querySelector('img');
    lightboxImage.src = item.dataset.src;
    lightboxImage.alt = image.alt;
    lightboxCounter.textContent = `${current + 1} / ${items.length}`;
  }

  function openLightbox(index) {
    current = index;
    showImage();
    lightbox.classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lightbox.classList.remove('active');
    document.body.style.overflow = '';
    lightboxImage.src = '';
  }

  function previousImage() {
    current = (current - 1 + items.length) % items.length;
    showImage();
  }

  function nextImage() {
    current = (current + 1) % items.length;
    showImage();
  }

  items.forEach((item, index) => item.addEventListener('click', (event) => {
    if (event.target.closest('a')) return;
    openLightbox(index);
  }));
  document.getElementById('lb-close').addEventListener('click', closeLightbox);
  document.getElementById('lb-prev').addEventListener('click', previousImage);
  document.getElementById('lb-next').addEventListener('click', nextImage);
  lightbox.addEventListener('click', (event) => { if (event.target === lightbox) closeLightbox(); });

  document.addEventListener('keydown', (event) => {
    if (!lightbox.classList.contains('active')) return;
    if (event.key === 'Escape') closeLightbox();
    if (event.key === 'ArrowLeft') previousImage();
    if (event.key === 'ArrowRight') nextImage();
  });
</script>

</body>
</html>
